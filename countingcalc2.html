<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Counting Calculator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #1e1e1e;
        color: #fff;
        overflow: hidden; /* No scrolling */
    }
    h1 {
        text-align: center;
        background-color: #333;
        color: #fff;
        padding: 10px 0;
        margin: 0;
        font-size: 18px;
    }

    /* Main container adapted for iPhone width */
    .container {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        gap: 10px;
        box-sizing: border-box;
    }

    /* Compress columns to fit side by side */
    .column {
        flex: 1;
        max-width: 48%;
        background: #222;
        padding: 10px;
        border-radius: 6px;
        box-sizing: border-box;
    }
    h2 {
        text-align: center;
        background-color: #444;
        padding: 5px;
        margin-bottom: 10px;
        font-size: 16px;
        border-radius: 4px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
    }
    .row label {
        flex: 1;
        font-size: 14px;
    }
    .row input {
        flex: 1;
        background-color: #333;
        color: #fff;
        border: 1px solid #555;
        padding: 4px;
        font-size: 14px;
        text-align: center;
        border-radius: 4px;
        max-width: 50px;
    }
    .row span {
        flex: 1;
        text-align: right;
        font-size: 14px;
    }

    .subtotal {
        text-align: center;
        font-weight: bold;
        margin-top: 12px;
        font-size: 15px;
    }
    .subtotal span {
        font-weight: normal;
    }

    /* OFFERINGS SECTION */
    .offerings-container {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
    }

    .offer-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        gap: 10px;
    }

    .offer-row select,
    .offer-row input[type="text"],
    .offer-row input[type="number"] {
        flex: 1;
        background-color: #333;
        border: 1px solid #555;
        padding: 5px;
        font-size: 14px;
        color: white;
        border-radius: 4px;
        text-align: center;
    }

    /* Buttons */
    .button-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 20px;
        box-sizing: border-box;
    }
    button {
        flex: 1;
        margin: 0 5px;
        padding: 10px 0;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }
    .copy-all-button {
        background-color: #d9534f;
    }
</style>
</head>

<body>

<div class="container">

    <!-- NOTES COLUMN -->
    <div class="column">
        <h2>Notes</h2>

        <div class="row"><label>$100</label><input id="note100" type="number" min="0" oninput="updateTotals()"><span id="subtotalNote100">0</span></div>
        <div class="row"><label>$50</label><input id="note50" type="number" min="0" oninput="updateTotals()"><span id="subtotalNote50">0</span></div>
        <div class="row"><label>$20</label><input id="note20" type="number" min="0" oninput="updateTotals()"><span id="subtotalNote20">0</span></div>
        <div class="row"><label>$10</label><input id="note10" type="number" min="0" oninput="updateTotals()"><span id="subtotalNote10">0</span></div>
        <div class="row"><label>$5</label><input id="note5" type="number" min="0" oninput="updateTotals()"><span id="subtotalNote5">0</span></div>

        <div class="subtotal">Subtotal Notes: $<span id="subtotalNotes">0</span></div>
    </div>

    <!-- COINS COLUMN -->
    <div class="column">
        <h2>Coins</h2>

        <div class="row"><label>$2</label><input id="coin2" type="number" min="0" oninput="updateTotals()"><span id="subtotalCoin2">0.00</span></div>
        <div class="row"><label>$1</label><input id="coin1" type="number" min="0" oninput="updateTotals()"><span id="subtotalCoin1">0.00</span></div>
        <div class="row"><label>50c</label><input id="coin50c" type="number" min="0" oninput="updateTotals()"><span id="subtotalCoin50c">0.00</span></div>
        <div class="row"><label>20c</label><input id="coin20c" type="number" min="0" oninput="updateTotals()"><span id="subtotalCoin20c">0.00</span></div>
        <div class="row"><label>10c</label><input id="coin10c" type="number" min="0" oninput="updateTotals()"><span id="subtotalCoin10c">0.00</span></div>
        <div class="row"><label>5c</label><input id="coin5c" type="number" min="0" oninput="updateTotals()"><span id="subtotalCoin5c">0.00</span></div>

        <div class="subtotal">Subtotal Coins: $<span id="subtotalCoins">0.00</span></div>
    </div>

</div>

<!-- OFFERINGS SECTION -->
<div class="offerings-container">

    <h2 style="text-align:center;background:#444;padding:5px;margin:0 0 10px;border-radius:4px;">Offerings</h2>

    <div class="offer-row">
        <select id="label1">
            <option>World Evangelism</option>
            <option>Revival</option>
            <option>Love Offering</option>
            <option>Men's Discipleship</option>
            <option>Building</option>
        </select>
        <input type="number" id="value1" min="0" oninput="updateTotals()">
    </div>

    <div class="offer-row">
        <select id="label2">
            <option>Revival</option>
            <option>World Evangelism</option>
            <option>Love Offering</option>
            <option>Men's Discipleship</option>
            <option>Building</option>
        </select>
        <input type="number" id="value2" min="0" oninput="updateTotals()">
    </div>

    <div class="offer-row">
        <input type="text" id="label3" placeholder="Custom">
        <input type="number" id="value3" min="0" oninput="updateTotals()">
    </div>

    <div class="offer-row">
        <input type="text" id="label4" placeholder="Custom">
        <input type="number" id="value4" min="0" oninput="updateTotals()">
    </div>

    <div class="offer-row">
        <input type="text" id="label5" placeholder="Custom">
        <input type="number" id="value5" min="0" oninput="updateTotals()">
    </div>

    <div class="subtotal">Tithes & Offerings: $<span id="conferenceTotal">0.00</span></div>
    <div class="subtotal">Grand Total: $<span id="grandTotal">0.00</span></div>

</div>

<div class="button-row">
    <button class="copy-all-button" onclick="copyAll()">Copy Full</button>
    <button onclick="copyShort()">Copy Summary</button>
</div>

<script>
function updateTotals() {
    const noteVals = {note100:100,note50:50,note20:20,note10:10,note5:5};
    const coinVals = {coin2:2,coin1:1,coin50c:0.5,coin20c:0.2,coin10c:0.1,coin5c:0.05};

    let noteTotal = 0;
    for (let id in noteVals) {
        const qty = +document.getElementById(id).value || 0;
        const sub = qty * noteVals[id];
        document.getElementById("subtotal" + id.charAt(0).toUpperCase() + id.slice(1)).textContent = sub.toFixed(0);
        noteTotal += sub;
    }

    let coinTotal = 0;
    for (let id in coinVals) {
        const qty = +document.getElementById(id).value || 0;
        const sub = qty * coinVals[id];
        document.getElementById("subtotal" + id.charAt(0).toUpperCase() + id.slice(1)).textContent = sub.toFixed(2);
        coinTotal += sub;
    }

    let offerings = 0;
    for (let i = 1; i <= 5; i++) {
        offerings += +document.getElementById("value" + i).value || 0;
    }

    const total = noteTotal + coinTotal;
    const tithe = total - offerings;

    document.getElementById("subtotalNotes").textContent = noteTotal.toFixed(0);
    document.getElementById("subtotalCoins").textContent = coinTotal.toFixed(2);
    document.getElementById("grandTotal").textContent = total.toFixed(2);
    document.getElementById("conferenceTotal").textContent = tithe.toFixed(2);
}

function copyShort() {
    const dow = new Date().toLocaleDateString('en-US',{weekday:'long'});
    const tod = new Date().getHours() < 12 ? "morning" : "evening";

    let extra = "";
    for (let i=1;i<=5;i++){
        const labelEl = document.getElementById("label"+i);
        const label = labelEl.tagName==="SELECT" ? labelEl.value : labelEl.value;
        const val = +document.getElementById("value"+i).value || 0;
        if (label && val>0) extra += `, ${label} $${val}`;
    }

    const txt = `${dow} ${tod}, Tithe $${document.getElementById("conferenceTotal").textContent}${extra}, Total $${document.getElementById("grandTotal").textContent}`;

    navigator.clipboard.writeText(txt).then(()=>alert("Copied"));
}

function copyAll() {
    let txt = "";

    ["note100","note50","note20","note10","note5"].forEach(id=>{
        const qty = +document.getElementById(id).value || 0;
        if (qty>0) txt += `${id}: ${qty}\n`;
    });

    ["coin2","coin1","coin50c","coin20c","coin10c","coin5c"].forEach(id=>{
        const qty = +document.getElementById(id).value || 0;
        if (qty>0) txt += `${id}: ${qty}\n`;
    });

    txt += `\nSubtotal Notes: $${document.getElementById("subtotalNotes").textContent}`;
    txt += `\nSubtotal Coins: $${document.getElementById("subtotalCoins").textContent}`;

    for (let i=1;i<=5;i++){
        const labelEl = document.getElementById("label"+i);
        const label = labelEl.tagName==="SELECT" ? labelEl.value : (labelEl.value || "Custom");
        const val = document.getElementById("value"+i).value || 0;
        txt += `\n${label}: $${val}`;
    }

    txt += `\n\nTithes & Offerings: $${document.getElementById("conferenceTotal").textContent}`;
    txt += `\nGrand Total: $${document.getElementById("grandTotal").textContent}`;

    navigator.clipboard.writeText(txt).then(()=>alert("Copied"));
}

document.addEventListener("DOMContentLoaded", updateTotals);
</script>

</body>
</html>
