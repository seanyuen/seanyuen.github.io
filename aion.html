<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AION UT · Charge Planner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

  /* ── THEME TOKENS ── */
  :root[data-theme="light"] {
    --bg:             #f0f2f5;
    --card:           #ffffff;
    --card-border:    #d1d9e6;
    --track:          #f8fafc;
    --text:           #1a2744;
    --grey:           #4a5568;
    --dim:            #6b7a99;
    --accent:         #1e40af;
    --green:          #16a34a;
    --amber:          #d97706;
    --red:            #dc2626;
    --sticky-bg:      #1a2744;
    --sticky-text:    rgba(255,255,255,0.5);
    --sticky-val:     #4ade80;
    --sticky-sub:     rgba(255,255,255,0.55);
    --sticky-div:     rgba(255,255,255,0.12);
    --bk-off-bg:      rgba(22,163,74,0.05);
    --bk-off-bd:      rgba(22,163,74,0.35);
    --bk-off-fg:      #16a34a;
    --bk-std-bg:      rgba(220,38,38,0.04);
    --bk-std-bd:      rgba(220,38,38,0.25);
    --bk-std-fg:      #dc2626;
    --status-ok-bg:   rgba(22,163,74,0.08);
    --status-ok-bd:   rgba(22,163,74,0.25);
    --status-ok-fg:   #16a34a;
    --status-err-bg:  rgba(220,38,38,0.07);
    --status-err-bd:  rgba(220,38,38,0.2);
    --status-err-fg:  #dc2626;
    --btn-active-bg:  rgba(30,64,175,0.07);
    --btn-active-bd:  #1e40af;
    --btn-active-nm:  #1a2744;
    --btn-active-ds:  #4a5568;
    --opt-pill-bg:    rgba(30,64,175,0.08);
    --opt-pill-bd:    rgba(30,64,175,0.3);
    --opt-pill-fg:    #1e40af;
    --opt-pill-hv:    rgba(30,64,175,0.15);
    --arrow-fg:       #1e40af;
    --focus-bg:       rgba(30,64,175,0.04);
    --focus-bd:       #1e40af;
    --shadow:         0 1px 4px rgba(0,0,0,0.06);
    --toggle-bg:      #1a2744;
    --toggle-fg:      #ffffff;
  }

  :root[data-theme="dark"] {
    --bg:             #09100d;
    --card:           #101810;
    --card-border:    #1c2e1f;
    --track:          #182018;
    --text:           #e6f0e8;
    --grey:           #9ab09f;
    --dim:            #6b8a70;
    --accent:         #4ecb71;
    --green:          #4ecb71;
    --amber:          #f07040;
    --red:            #f07040;
    --sticky-bg:      #101810;
    --sticky-text:    #6b8a70;
    --sticky-val:     #4ecb71;
    --sticky-sub:     #9ab09f;
    --sticky-div:     #1c2e1f;
    --bk-off-bg:      rgba(78,203,113,0.06);
    --bk-off-bd:      rgba(78,203,113,0.25);
    --bk-off-fg:      #4ecb71;
    --bk-std-bg:      rgba(240,112,64,0.05);
    --bk-std-bd:      rgba(240,112,64,0.2);
    --bk-std-fg:      #f07040;
    --status-ok-bg:   rgba(78,203,113,0.08);
    --status-ok-bd:   rgba(78,203,113,0.2);
    --status-ok-fg:   #4ecb71;
    --status-err-bg:  rgba(240,112,64,0.08);
    --status-err-bd:  rgba(240,112,64,0.25);
    --status-err-fg:  #f07040;
    --btn-active-bg:  rgba(78,203,113,0.12);
    --btn-active-bd:  #4ecb71;
    --btn-active-nm:  #e6f0e8;
    --btn-active-ds:  #9ab09f;
    --opt-pill-bg:    rgba(78,203,113,0.1);
    --opt-pill-bd:    rgba(78,203,113,0.3);
    --opt-pill-fg:    #4ecb71;
    --opt-pill-hv:    rgba(78,203,113,0.18);
    --arrow-fg:       #4ecb71;
    --focus-bg:       rgba(78,203,113,0.05);
    --focus-bd:       #4ecb71;
    --shadow:         none;
    --toggle-bg:      #1c2e1f;
    --toggle-fg:      #4ecb71;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
    transition: background 0.2s, color 0.2s;
  }

  /* ── STICKY BAR ── */
  .sticky-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--sticky-bg);
    border-bottom: 1px solid var(--sticky-div);
    padding: 12px 16px 10px;
    display: flex;
    align-items: stretch;
    gap: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .sb-title {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sticky-text);
    margin-bottom: 5px;
  }
  .sb-col {
    flex: 1;
    padding-right: 16px;
    border-right: 1px solid var(--sticky-div);
    margin-right: 16px;
  }
  .sb-col:last-of-type { padding-right: 0; border-right: none; margin-right: 0; }
  .sb-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    color: var(--sticky-val);
    letter-spacing: -0.02em;
  }
  .sb-val.warn { color: var(--red); }
  .sb-unit { font-size: 13px; font-weight: 500; color: var(--sticky-sub); margin-left: 2px; }
  .sb-sub { font-size: 10px; font-weight: 500; color: var(--sticky-sub); margin-top: 2px; }
  .sb-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .sb-badge {
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: rgba(74,222,128,0.15);
    color: #4ade80;
    border: 1px solid rgba(74,222,128,0.35);
    white-space: nowrap;
  }
  .sb-badge.warn { background: rgba(248,113,113,0.15); color: #f87171; border-color: rgba(248,113,113,0.35); }
  .sb-badge.amber { background: rgba(251,191,36,0.15); color: #fbbf24; border-color: rgba(251,191,36,0.35); }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    background: var(--toggle-bg);
    border: none;
    border-radius: 20px;
    cursor: pointer;
    width: 34px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  /* ── SCROLL AREA ── */
  .scroll-area {
    padding: 16px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .card-title {
    padding: 14px 18px 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* ── CHARGER TOGGLE ── */
  .charger-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .ch-btn {
    background: var(--track);
    border: 2px solid var(--card-border);
    border-radius: 14px;
    padding: 14px 12px 12px;
    cursor: pointer;
    text-align: left;
    color: var(--dim);
    transition: background 0.15s, border-color 0.15s;
  }
  .ch-btn .ch-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    display: block;
    line-height: 1;
    color: var(--dim);
  }
  .ch-btn .ch-desc { font-size: 10px; font-weight: 500; display: block; margin-top: 5px; color: var(--dim); line-height: 1.4; }
  .ch-btn.active { background: var(--btn-active-bg); border-color: var(--btn-active-bd); }
  .ch-btn.active .ch-name { color: var(--btn-active-nm); }
  .ch-btn.active .ch-desc { color: var(--btn-active-ds); }

  /* ── INPUT FIELDS ── */
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 12px 12px; }
  .input-field {
    background: var(--track);
    border: 1.5px solid var(--card-border);
    border-radius: 14px;
    padding: 12px 14px 10px;
    transition: border-color 0.15s, background 0.15s;
  }
  .input-field:focus-within { border-color: var(--focus-bd); background: var(--focus-bg); }
  .if-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--grey); margin-bottom: 4px; display: block; }
  .if-inner { display: flex; align-items: baseline; gap: 4px; }
  .if-inner input[type="number"] {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 34px; font-weight: 700; width: 100%; min-width: 0;
    padding: 0; -moz-appearance: textfield; letter-spacing: -0.02em;
  }
  .if-inner input[type="number"]::-webkit-inner-spin-button,
  .if-inner input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .if-inner input[type="time"] {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 700; width: 100%; min-width: 0;
    padding: 0; letter-spacing: -0.01em;
  }
  .if-inner input[type="time"]::-webkit-calendar-picker-indicator { filter: opacity(0.4); }
  .if-unit { font-size: 13px; font-weight: 600; color: var(--dim); flex-shrink: 0; }

  /* ── AMP BLOCK ── */
  .amp-card-inner { padding: 0 12px 14px; display: flex; align-items: center; gap: 10px; }
  .amp-field {
    background: var(--track);
    border: 1.5px solid var(--card-border);
    border-radius: 14px;
    padding: 12px 14px 10px;
    flex: 0 0 auto;
    width: 130px;
    transition: border-color 0.15s, background 0.15s;
  }
  .amp-field:focus-within { border-color: var(--focus-bd); background: var(--focus-bg); }
  .amp-field input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 34px; font-weight: 700; width: 100%; min-width: 0;
    padding: 0; -moz-appearance: textfield;
  }
  .amp-field input::-webkit-inner-spin-button,
  .amp-field input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .amp-info { flex: 1; min-width: 0; }
  .amp-rate { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .amp-rate span { font-size: 11px; font-weight: 500; color: var(--dim); }
  .opt-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--opt-pill-bg); border: 1px solid var(--opt-pill-bd);
    border-radius: 8px; color: var(--opt-pill-fg);
    font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
    padding: 5px 9px; cursor: pointer; margin-top: 2px;
    transition: background 0.12s;
  }
  .opt-pill:hover { background: var(--opt-pill-hv); }
  .opt-note { font-size: 10px; color: var(--dim); margin-top: 4px; line-height: 1.3; }
  .l2-block { display: block; }
  .l2-block.hidden { display: none; }

  /* ── BREAKDOWN ── */
  .bk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .bk-cell {
    background: var(--track);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 12px 14px;
    transition: background 0.2s, border-color 0.2s;
  }
  .bk-cell.off { border-color: var(--bk-off-bd); background: var(--bk-off-bg); }
  .bk-cell.std { border-color: var(--bk-std-bd); background: var(--bk-std-bg); }
  .bk-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .bk-cell.off .bk-label { color: var(--bk-off-fg); }
  .bk-cell.std .bk-label { color: var(--bk-std-fg); }
  .bk-cost-val { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .bk-cell.off .bk-cost-val { color: var(--bk-off-fg); }
  .bk-cell.std .bk-cost-val { color: var(--bk-std-fg); }
  .bk-detail { font-size: 10px; font-weight: 500; color: var(--dim); line-height: 1.5; }

  /* ── STATUS STRIP ── */
  .status-strip {
    margin: 0 12px 12px;
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
    background: var(--status-ok-bg); color: var(--status-ok-fg); border: 1px solid var(--status-ok-bd);
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .status-strip.warn { background: var(--status-err-bg); color: var(--status-err-fg); border-color: var(--status-err-bd); }
  .ss-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* ── SETTINGS ── */
  details { border-top: 1px solid var(--card-border); }
  details summary {
    padding: 14px 18px; cursor: pointer;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--dim); list-style: none; display: flex; align-items: center; gap: 8px; user-select: none;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::after { content: '↓'; margin-left: auto; font-size: 12px; color: var(--arrow-fg); transition: transform 0.15s; }
  details[open] summary::after { transform: rotate(180deg); }
  .sg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 12px 14px; }
  .sg-f { display: flex; flex-direction: column; gap: 4px; }
  .sg-f label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); }
  .sg-f input {
    background: var(--track); border: 1.5px solid var(--card-border); border-radius: 10px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
    font-weight: 500; padding: 8px 10px; outline: none; width: 100%; -moz-appearance: textfield;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .sg-f input::-webkit-inner-spin-button,
  .sg-f input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .sg-f input:focus { border-color: var(--focus-bd); }

  footer {
    max-width: 480px; margin: 0 auto; padding: 14px 16px 0;
    font-size: 9px; font-weight: 500; color: var(--dim); letter-spacing: 0.05em; text-align: center;
  }
</style>
</head>
<body>

<div class="sticky-bar">
  <div class="sb-col">
    <div class="sb-title">Range at <span id="endTimeLbl">06:00</span></div>
    <div><span class="sb-val" id="finalKm">—</span><span class="sb-unit">km</span></div>
    <div class="sb-sub"><span id="finalPct">—</span>% state of charge</div>
  </div>
  <div class="sb-col">
    <div class="sb-title">Cost</div>
    <div class="sb-val" id="totalCost" style="font-size:30px">$0.00</div>
    <div class="sb-sub"><span id="blendedRate">—</span> · <span id="petrolEquiv">—</span></div>
  </div>
  <div class="sb-right">
    <span class="sb-badge" id="sbBadge">Ready</span>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌙</button>
  </div>
</div>

<div class="scroll-area">

  <div class="card">
    <div class="card-title">Charger</div>
    <div class="charger-grid">
      <button class="ch-btn" id="btnL1" onclick="selectCharger('L1')">
        <span class="ch-name">LVL 1</span>
        <span class="ch-desc">Scheduled<br>7A · off-peak only</span>
      </button>
      <button class="ch-btn" id="btnL2" onclick="selectCharger('L2')">
        <span class="ch-name">LVL 2</span>
        <span class="ch-desc">Starts now<br>4–32A variable</span>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Current charge</div>
    <div class="input-row">
      <div class="input-field">
        <span class="if-label">Range</span>
        <div class="if-inner">
          <input type="number" id="currentKm" min="0" max="430" value="129">
          <span class="if-unit">km</span>
        </div>
      </div>
      <div class="input-field">
        <span class="if-label">SOC</span>
        <div class="if-inner">
          <input type="number" id="currentPct" min="0" max="100" value="30">
          <span class="if-unit">%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Charging window</div>
    <div class="input-row">
      <div class="input-field">
        <span class="if-label">Start</span>
        <div class="if-inner"><input type="time" id="startTime" value="00:00"></div>
      </div>
      <div class="input-field">
        <span class="if-label">End</span>
        <div class="if-inner"><input type="time" id="endTime" value="06:00"></div>
      </div>
    </div>
    <div class="l2-block" id="l2Block">
      <div class="amp-card-inner">
        <div class="amp-field">
          <span class="if-label">Amps</span>
          <div class="if-inner">
            <input type="number" id="amperageNum" min="4" max="32" value="32">
            <span class="if-unit">A</span>
          </div>
        </div>
        <div class="amp-info">
          <div class="amp-rate"><span id="rateDisplay">7.16</span> <span>kWh/hr</span></div>
          <button class="opt-pill" id="optimiseBtn" onclick="applyOptimal()">↓ Optimise</button>
          <div class="opt-note" id="optimalNote"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" style="padding-bottom:10px">Cost breakdown</div>
    <div class="bk-grid">
      <div class="bk-cell off">
        <div class="bk-label">Off-peak</div>
        <div class="bk-cost-val" id="bkOffCost">$0.00</div>
        <div class="bk-detail" id="bkOffKwh">0.0 kWh</div>
        <div class="bk-detail" id="bkOffTime">—</div>
      </div>
      <div class="bk-cell std">
        <div class="bk-label">Standard</div>
        <div class="bk-cost-val" id="bkStdCost">$0.00</div>
        <div class="bk-detail" id="bkStdKwh">0.0 kWh</div>
        <div class="bk-detail" id="bkFinish">—</div>
      </div>
    </div>
    <div class="status-strip" id="statusLine">
      <span class="ss-dot"></span>
      <span id="statusText">—</span>
    </div>
    <details>
      <summary>Settings</summary>
      <div class="sg-grid">
        <div class="sg-f"><label>Rate at 32A (kWh/hr)</label><input type="number" id="s_rate" value="7.16" step="0.01"></div>
        <div class="sg-f"><label>Battery usable (kWh)</label><input type="number" id="s_capacity" value="60" step="0.1"></div>
        <div class="sg-f"><label>Full range (km)</label><input type="number" id="s_fullKm" value="430" step="1"></div>
        <div class="sg-f"><label>Level 1 amps (A)</label><input type="number" id="s_l1Amps" value="7" step="1" min="1" max="15"></div>
        <div class="sg-f"><label>L1 rate (kWh/hr)</label><input type="number" id="s_l1Rate" value="1.577" step="0.001"></div>
        <div class="sg-f"><label>Off-peak start</label><input type="time" id="s_wStart" value="00:00"></div>
        <div class="sg-f"><label>Off-peak end</label><input type="time" id="s_wEnd" value="06:00"></div>
        <div class="sg-f"><label>Off-peak rate (c/kWh)</label><input type="number" id="s_offRate" value="4.5" step="0.1"></div>
        <div class="sg-f"><label>Standard rate (c/kWh)</label><input type="number" id="s_stdRate" value="31.66" step="0.01"></div>
        <div class="sg-f"><label>Petrol (L/100km)</label><input type="number" id="s_petrol" value="7.0" step="0.1"></div>
      </div>
    </details>
  </div>

</div>

<footer>60 kWh · 430 km WLTP · 7.16 kWh/hr @ 32A · 1.577 kWh/hr @ 7A</footer>

<script>
  // ── THEME ──
  const html = document.documentElement;
  const toggleBtn = document.getElementById('themeToggle');

  function applyTheme(theme) {
    html.setAttribute('data-theme', theme);
    toggleBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
    try { localStorage.setItem('aion-theme', theme); } catch(e) {}
  }

  toggleBtn.addEventListener('click', () => {
    applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  try {
    const saved = localStorage.getItem('aion-theme');
    if (saved === 'dark' || saved === 'light') applyTheme(saved);
  } catch(e) {}

  // ── CALC ──
  let charger = 'L2';

  function getTimeMins(id) {
    const val = document.getElementById(id).value || '00:00';
    const [h, m] = val.split(':').map(Number);
    return h * 60 + m;
  }
  function setTime(id, totalMins) {
    const t = ((Math.round(totalMins) % 1440) + 1440) % 1440;
    const h = String(Math.floor(t / 60)).padStart(2, '0');
    const m = String(t % 60).padStart(2, '0');
    document.getElementById(id).value = `${h}:${m}`;
  }
  function toMins(t) {
    const [h, m] = (t || '00:00').split(':').map(Number);
    return h * 60 + m;
  }
  function toHHMM(totalMins) {
    const t = ((Math.round(totalMins) % 1440) + 1440) % 1440;
    return String(Math.floor(t / 60)).padStart(2, '0') + ':' + String(t % 60).padStart(2, '0');
  }
  function fmtHM(mins) {
    const h = Math.floor(Math.abs(mins) / 60), m = Math.round(Math.abs(mins) % 60);
    return `${h}h ${m}m`;
  }

  function splitSession(startMins, durationMins, wStartMins, wEndMins) {
    if (durationMins <= 0) return { offPeak: 0, standard: 0 };
    let wDur = wEndMins - wStartMins;
    if (wDur <= 0) wDur += 1440;
    let offPeak = 0, elapsed = 0, guard = 0;
    while (elapsed < durationMins && guard++ < 5000) {
      const tod = ((startMins + elapsed) % 1440 + 1440) % 1440;
      const pos = ((tod - wStartMins) % 1440 + 1440) % 1440;
      const inWindow = pos < wDur;
      const step = Math.min(inWindow ? wDur - pos : 1440 - pos, durationMins - elapsed);
      if (inWindow) offPeak += step;
      elapsed += step;
    }
    return { offPeak, standard: durationMins - offPeak };
  }

  function selectCharger(c) {
    charger = c;
    document.getElementById('btnL1').classList.toggle('active', c === 'L1');
    document.getElementById('btnL2').classList.toggle('active', c === 'L2');
    document.getElementById('l2Block').classList.toggle('hidden', c === 'L1');
    if (c === 'L1') {
      setTime('startTime', 0);
    } else {
      const now = new Date();
      setTime('startTime', now.getHours() * 60 + now.getMinutes());
    }
    update();
  }

  const currentKmEl  = document.getElementById('currentKm');
  const currentPctEl = document.getElementById('currentPct');
  currentKmEl.addEventListener('input', () => {
    const fullKm = Number(document.getElementById('s_fullKm').value) || 430;
    currentPctEl.value = Math.round(Math.min(100, (Number(currentKmEl.value) || 0) / fullKm * 100));
    update();
  });
  currentPctEl.addEventListener('input', () => {
    const fullKm = Number(document.getElementById('s_fullKm').value) || 430;
    currentKmEl.value = Math.round(Math.min(fullKm, (Number(currentPctEl.value) || 0) / 100 * fullKm));
    update();
  });

  ['startTime','endTime','amperageNum',
   's_rate','s_capacity','s_fullKm','s_l1Amps','s_l1Rate',
   's_wStart','s_wEnd','s_offRate','s_stdRate','s_petrol'
  ].forEach(id => document.getElementById(id).addEventListener('input', update));

  let _optimalAmps = 32;
  function applyOptimal() {
    document.getElementById('amperageNum').value = _optimalAmps;
    update();
  }

  function update() {
    const rate32   = Math.max(0.01, Number(document.getElementById('s_rate').value)     || 7.16);
    const l1Rate   = Math.max(0.01, Number(document.getElementById('s_l1Rate').value)   || 1.577);
    const capacity = Math.max(0.1,  Number(document.getElementById('s_capacity').value) || 60);
    const fullKm   = Math.max(1,    Number(document.getElementById('s_fullKm').value)   || 430);
    const l1Amps   = Math.max(1,    Number(document.getElementById('s_l1Amps').value)   || 7);
    const wStart   = toMins(document.getElementById('s_wStart').value || '00:00');
    const wEnd     = toMins(document.getElementById('s_wEnd').value   || '06:00');
    const offRate  = Number(document.getElementById('s_offRate').value)  || 4.5;
    const stdRate  = Number(document.getElementById('s_stdRate').value)  || 31.66;
    const petrolL  = Number(document.getElementById('s_petrol').value)   || 7.0;

    const currentPct    = Math.min(100, Math.max(0, Number(currentPctEl.value) || 0));
    const currentEnergy = (currentPct / 100) * capacity;
    const maxAddable    = capacity - currentEnergy;

    const startMins = getTimeMins('startTime');
    const endMins   = getTimeMins('endTime');
    let windowMins  = endMins - startMins;
    if (windowMins <= 0) windowMins += 1440;

    document.getElementById('endTimeLbl').textContent = document.getElementById('endTime').value || '06:00';

    let energyAdded, offPeakMins, standardMins, chargeDurationMins, amps;

    if (charger === 'L1') {
      amps = l1Amps;
      const rate = l1Rate;
      let wDur = wEnd - wStart;
      if (wDur <= 0) wDur += 1440;
      const effectiveEndAbs = startMins + windowMins;
      const wStartAbs  = (wStart >= startMins) ? wStart : wStart + 1440;
      const wEndAbs    = wStartAbs + wDur;
      const chargeEnd  = Math.min(wEndAbs, effectiveEndAbs);
      const availMins  = Math.max(0, chargeEnd - wStartAbs);
      chargeDurationMins = Math.min(availMins, maxAddable > 0 ? (maxAddable / rate) * 60 : 0);
      energyAdded  = rate * (chargeDurationMins / 60);
      offPeakMins  = chargeDurationMins;
      standardMins = 0;
    } else {
      amps = Math.max(4, Math.min(32, Number(document.getElementById('amperageNum').value) || 32));
      const rate       = rate32 * (amps / 32);
      const maxTimeMins = maxAddable > 0 ? (maxAddable / rate) * 60 : 0;
      chargeDurationMins = Math.min(windowMins, maxTimeMins);
      energyAdded = rate * (chargeDurationMins / 60);
      const split  = splitSession(startMins, chargeDurationMins, wStart, wEnd);
      offPeakMins  = split.offPeak;
      standardMins = split.standard;

      const availHours = windowMins / 60;
      const neededRate = maxAddable / availHours;
      _optimalAmps = neededRate > rate32
        ? 32
        : Math.max(4, Math.min(32, Math.ceil((neededRate / rate32) * 32)));
      const optRate   = rate32 * (_optimalAmps / 32);
      const optFinish = startMins + (maxAddable / optRate) * 60;
      document.getElementById('rateDisplay').textContent = (rate32 * amps / 32).toFixed(2);
      document.getElementById('optimalNote').textContent =
        _optimalAmps === amps ? '✓ At optimal' : `${_optimalAmps}A → done ${toHHMM(optFinish)}`;
      document.getElementById('optimiseBtn').style.display = _optimalAmps === amps ? 'none' : 'inline-flex';
    }

    const finalEnergy = Math.min(capacity, currentEnergy + energyAdded);
    const finalPct    = (finalEnergy / capacity) * 100;
    const finalKm     = (finalPct / 100) * fullKm;

    const activeRate     = charger === 'L1' ? l1Rate : rate32 * (amps / 32);
    const offPeakEnergy  = activeRate * (offPeakMins / 60);
    const standardEnergy = energyAdded - offPeakEnergy;
    const offPeakCost    = Math.max(0, offPeakEnergy)  * offRate / 100;
    const standardCost   = Math.max(0, standardEnergy) * stdRate / 100;
    const totalCost      = offPeakCost + standardCost;

    const blendedCPkwh  = energyAdded > 0 ? (totalCost / energyAdded) * 100 : 0;
    const costPerKmCents = energyAdded > 0 ? (totalCost * 100) / finalKm : 0;
    const petrolEquivCL  = energyAdded > 0 ? (costPerKmCents / (petrolL / 100)) : 0;
    const isFullCharge   = finalPct >= 99.5;

    document.getElementById('finalKm').textContent   = Math.round(finalKm);
    document.getElementById('finalPct').textContent  = Math.round(finalPct);
    document.getElementById('totalCost').textContent = `$${totalCost.toFixed(2)}`;
    document.getElementById('blendedRate').textContent = energyAdded > 0 ? `${blendedCPkwh.toFixed(1)}c/kWh` : '—';
    document.getElementById('petrolEquiv').textContent = energyAdded > 0 ? `≈${Math.round(petrolEquivCL)}c/L` : '—';

    document.getElementById('bkOffCost').textContent = `$${offPeakCost.toFixed(2)}`;
    document.getElementById('bkOffKwh').textContent  = `${offPeakEnergy.toFixed(1)} kWh`;
    document.getElementById('bkOffTime').textContent = offPeakMins > 0 ? fmtHM(offPeakMins) : '—';
    document.getElementById('bkStdCost').textContent = `$${standardCost.toFixed(2)}`;
    document.getElementById('bkStdKwh').textContent  = `${Math.max(0, standardEnergy).toFixed(1)} kWh`;
    const finishTime = startMins + chargeDurationMins;
    const dayOver    = finishTime >= 2880 ? ' (+2d)' : finishTime >= 1440 ? ' (+1d)' : '';
    document.getElementById('bkFinish').textContent = chargeDurationMins > 0 ? `Done ${toHHMM(finishTime)}${dayOver}` : '—';

    const sl    = document.getElementById('statusLine');
    const st    = document.getElementById('statusText');
    const badge = document.getElementById('sbBadge');
    if (energyAdded < 0.1) {
      sl.className = 'status-strip warn'; st.textContent = 'No charging time in this window';
      badge.textContent = 'No charge'; badge.className = 'sb-badge warn';
    } else if (standardMins > 0) {
      sl.className = 'status-strip warn'; st.textContent = `${fmtHM(standardMins)} at standard rate (${stdRate}c/kWh)`;
      badge.textContent = 'Std rate'; badge.className = 'sb-badge amber';
    } else if (isFullCharge) {
      sl.className = 'status-strip'; st.textContent = 'Full charge · 100% off-peak';
      badge.textContent = 'Full'; badge.className = 'sb-badge';
    } else {
      sl.className = 'status-strip'; st.textContent = `${Math.round(finalPct)}% · all off-peak · +${energyAdded.toFixed(1)} kWh`;
      badge.textContent = 'Off-peak'; badge.className = 'sb-badge';
    }
  }

  (function init() { selectCharger('L2'); })();
</script>
</body>
</html>
